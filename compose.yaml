---
services:
  otel-collector:
    image: "otel/opentelemetry-collector-contrib:0.149.0"
    command:
    - "--config=/etc/otel-collector-config.yaml"
    volumes:
    - "./monitoring/otel-collector-config.yaml:/etc/otel-collector-config.yaml"
    ports:
    - "4317:4317"
    - "4318:4318"
    networks:
    - "monitoring"
    restart: "unless-stopped"
  jaeger:
    image: "jaegertracing/all-in-one:1.76.0"
    container_name: "jaeger"
    ports:
    - "16686:16686"
    - "14250:14250"
    networks:
    - "monitoring"
    environment:
    - "COLLECTOR_OTLP_ENABLED=true"
    restart: "unless-stopped"
  zipkin:
    image: "openzipkin/zipkin:3.6.1"
    container_name: "zipkin"
    ports:
    - "9411:9411"
    networks:
    - "monitoring"
    restart: "unless-stopped"
  elasticsearch:
    image: "docker.elastic.co/elasticsearch/elasticsearch:9.3.2"
    container_name: "elasticsearch"
    environment:
    - "discovery.type=single-node"
    - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    - "xpack.security.enabled=false"
    - "xpack.security.http.ssl.enabled=false"
    ports:
    - "9200:9200"
    networks:
    - "monitoring"
    restart: "unless-stopped"
  kibana:
    image: "docker.elastic.co/kibana/kibana:9.3.3"
    container_name: "kibana"
    ports:
    - "5601:5601"
    networks:
    - "monitoring"
    depends_on:
    - "elasticsearch"
    restart: "unless-stopped"
  apm-server:
    image: "docker.elastic.co/apm/apm-server:9.3.2"
    container_name: "apm-server"
    depends_on:
    - "elasticsearch"
    environment:
    - "ELASTICSEARCH_HOSTS=http://elasticsearch:9200"
    - "output.elasticsearch.hosts=[\"http://elasticsearch:9200\"]"
    - "apm-server.kibana.enabled=true"
    - "apm-server.kibana.host=kibana:5601"
    - "apm-server.otlp.enabled=true"
    - "apm-server.otlp.http.enabled=true"
    - "apm-server.otlp.http.host=0.0.0.0:8200"
    ports:
    - "8200:8200"
    networks:
    - "monitoring"
    restart: "unless-stopped"
networks:
  monitoring:
    driver: "bridge"
