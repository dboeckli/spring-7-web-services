---
receivers:
  otlp:
    protocols:
      grpc:
        endpoint: "0.0.0.0:4317"
      http:
        endpoint: "0.0.0.0:4318"
processors:
  batch:
    timeout: "5s"
    send_batch_size: 1000
  memory_limiter:
    check_interval: "1s"
    limit_mib: 4000
    spike_limit_mib: 800
exporters:
  otlp_grpc:
    endpoint: "jaeger:4317"
    tls:
      insecure: true
  otlp_http/elastic-apm:
    endpoint: "http://apm-server:8200"
  debug:
    verbosity: "detailed"
  elasticsearch:
    endpoints:
    - "http://elasticsearch:9200"
  zipkin:
    endpoint: "http://zipkin:9411/api/v2/spans"
    format: "proto"
service:
  pipelines:
    traces:
      receivers:
      - "otlp"
      processors:
      - "memory_limiter"
      - "batch"
      exporters:
      - "otlp_grpc"
      - "zipkin"
      - "otlp_http/elastic-apm"
    metrics:
      receivers:
      - "otlp"
      processors:
      - "memory_limiter"
      - "batch"
      exporters:
      - "otlp_http/elastic-apm"
    logs:
      receivers:
      - "otlp"
      processors:
      - "memory_limiter"
      - "batch"
      exporters:
      - "elasticsearch"
