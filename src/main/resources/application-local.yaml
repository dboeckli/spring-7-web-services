---
server:
  port: 8080
spring:
  application:
    name: "spring-7-web-services"
  docker:
    compose:
      enabled: true
      stop:
        command: "down"
      skip:
        in-tests: true
  webservices:
    wsdl-locations: "classpath:META-INF/schemas/"
camel:
  opentelemetry2:
    enabled: true
    traceProcessors: true
  health:
    enabled: true
    routes-enabled: true
    consumers-enabled: true
    producers-enabled: true
management:
  health:
    readinessstate:
      enabled: true
    livenessstate:
      enabled: true
  endpoints:
    access:
      default: "unrestricted"
    web:
      exposure:
        include: "*"
  endpoint:
    configprops:
      show-values: "ALWAYS"
    health:
      probes:
        enabled: true
      show-details: "always"
    camelroutes:
      read-only: true
      access: "unrestricted"
  info:
    build:
      enabled: true
    env:
      enabled: true
    java:
      enabled: true
    os:
      enabled: true
    git:
      enabled: true
      mode: "full"
  httpexchanges:
    recording:
      enabled: true
      include: "request_headers, response_headers, session_id, time_taken"
  observations:
    annotations:
      enabled: true
    http:
      server:
        requests:
          name: "http.server.requests"
      client:
        requests:
          name: "http-client-requests"
  otlp:
    metrics:
      export:
        enabled: true
        url: "http://localhost:4318/v1/metrics"
        step: "10s"
  tracing:
    export:
      otlp:
        enabled: true
    sampling:
      probability: 1.0
    propagation:
      type: w3c
    baggage:
      enabled: true
      remote-fields:
        - testBaggage,addedBaggage # Erlaubt das Empfangen des Headers "baggage: test1=..."
      tag-fields:
        - testBaggage,addedBaggage # KOPIERT den Wert aus dem Baggage in die Span-Labels (Attributes)
      correlation:
        fields:
          - testBaggage,addedBaggage
  logging:
    export:
      enabled: false
      otlp:
        enabled: false
  opentelemetry:
    resource-attributes:
      service.namespace: "spring-7-web-services"
      deployment.environment: "local"
    tracing:
      export:
        otlp:
          endpoint: "http://localhost:4318/v1/traces"

logging:
  level:
    org.springframework.web.filter.CommonsRequestLoggingFilter: "DEBUG"